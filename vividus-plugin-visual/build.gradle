project.description = 'VIVIDUS plugin for Visual Testing'

sourceSets {
    blobStorage {
        compileClasspath += sourceSets.main.output + sourceSets.main.compileClasspath
        runtimeClasspath += sourceSets.main.output + sourceSets.main.runtimeClasspath
    }
    blobStorageTest {
        compileClasspath += sourceSets.blobStorage.output + sourceSets.blobStorage.compileClasspath
        runtimeClasspath += sourceSets.blobStorage.output + sourceSets.blobStorage.runtimeClasspath
    }
}

java {
    registerFeature('blobStorage') {
        usingSourceSet(sourceSets.blobStorage)
    }
}

tasks.register('blobStorageTest', Test) {
    testClassesDirs = sourceSets.blobStorageTest.output.classesDirs
    classpath = sourceSets.blobStorageTest.runtimeClasspath
}
check.dependsOn blobStorageTest

dependencies {
    implementation project(':vividus-engine')
    implementation project(':vividus-plugin-web-app')
    implementation project(':vividus-reporter')
    implementation project(':vividus-soft-assert')
    implementation project(':vividus-util')
    implementation project(':vividus-extension-visual-testing')

    blobStorageImplementation project(':vividus-plugin-azure-storage-account')
    blobStorageImplementation platform(libs.spring.bom)
    blobStorageImplementation(libs.spring.context)
    blobStorageImplementation platform(libs.slf4j.bom)
    blobStorageImplementation(libs.slf4j.api)
    blobStorageImplementation platform('com.azure:azure-sdk-bom:1.3.6')
    blobStorageImplementation('com.azure:azure-storage-blob')
    blobStorageImplementation('jakarta.inject:jakarta.inject-api:2.0.1')

    implementation platform(libs.slf4j.bom)
    implementation(libs.slf4j.api)

    testImplementation platform(libs.junit.bom)
    testImplementation(libs.junit.jupiter)
    testRuntimeOnly(libs.junit.platformLauncher)
    testImplementation platform(libs.mockito.bom)
    testImplementation(libs.mockito.junitJupiter)
    testImplementation(libs.slf4jTest)

    blobStorageTestImplementation sourceSets.blobStorage.output
    blobStorageTestImplementation platform(libs.junit.bom)
    blobStorageTestImplementation(libs.junit.jupiter)
    blobStorageTestRuntimeOnly(libs.junit.platformLauncher)
    blobStorageTestImplementation platform(libs.mockito.bom)
    blobStorageTestImplementation(libs.mockito.junitJupiter)
    blobStorageTestImplementation(libs.slf4jTest)
}
